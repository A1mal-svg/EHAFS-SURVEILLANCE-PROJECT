project: ehafs

data:
  root: data/RWF-2000
  num_frames: 16
  frame_size: 224
  num_workers: 4
  classes: [NonFight, Fight]

model:
  backbone: mobilenet_v3_small
  pretrained: true
  tsm_div: 8           # 1/8 of channels shifted (per TSM paper)
  num_classes: 2
  dropout: 0.2

train:
  epochs: 50
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine
  min_lr: 1.0e-6
  early_stop_patience: 5
  seed: 42
  amp: true
  output_dir: checkpoints
  log_dir: runs
